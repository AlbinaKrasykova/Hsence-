<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Hsence CDSS agent flow">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#6b6660"/>
    </marker>
    <style>
      .t { font: 300 24px Roboto, Arial, sans-serif; fill: #1a1814; }
      .s { font: 300 13px Roboto, Arial, sans-serif; fill: #6b6660; }
      .n { font: 300 12px Roboto, Arial, sans-serif; fill: #1a1814; }
      .step { font: 400 11px Roboto, Arial, sans-serif; fill: #3d3a36; }
      .num { font: 400 10px Roboto, Arial, sans-serif; fill: #7F77DD; }
    </style>
  </defs>
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="36" text-anchor="middle" class="t">CDSS Agent Flow</text>
  <text x="450" y="58" text-anchor="middle" class="s">"Should I take berberine for PCOS?" ’ full traceable cycle</text>

  <!-- actors -->
  <rect x="40" y="90" width="120" height="44" rx="22" fill="#fef6e8" stroke="#BA7517"/>
  <text x="100" y="117" text-anchor="middle" class="n">Patient</text>
  <rect x="740" y="90" width="120" height="44" rx="22" fill="#f5f5f4" stroke="#b0aca8"/>
  <text x="800" y="117" text-anchor="middle" class="n">agent.html</text>

  <line x1="160" y1="112" x2="220" y2="112" stroke="#6b6660" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="680" y1="112" x2="740" y2="112" stroke="#6b6660" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="220" y="88" width="460" height="48" rx="10" fill="#e8f8f0" stroke="#1D9E75"/>
  <text x="450" y="117" text-anchor="middle" class="n">POST /agent/run · full_cycle + labs + wearable + daily log</text>

  <!-- steps -->
  <g transform="translate(60,170)">
    <rect x="0" y="0" width="780" height="300" rx="14" fill="#eeeefb" stroke="#7F77DD" stroke-width="1.5"/>
    <text x="20" y="28" class="n">planner.py ’ orchestrator.py</text>

    <g>
      <text x="20" y="58" class="num">1</text><text x="36" y="58" class="step">detect_patient_intent · supplement_self_treatment</text>
      <text x="20" y="82" class="num">2</text><text x="36" y="82" class="step">parse_lab_panel · PCOS · LH:FSH · HOMA-IR</text>
      <text x="20" y="106" class="num">3</text><text x="36" y="106" class="step">score_care_gaps · insulin resistance · androgen excess</text>
      <text x="20" y="130" class="num">4</text><text x="36" y="130" class="step">score_layer_health · Hormones · Metabolic · Cognition · Inflammation</text>
      <text x="20" y="154" class="num">5</text><text x="36" y="154" class="step">retrieve_guideline_snippet · explainability</text>
      <text x="20" y="178" class="num">6</text><text x="36" y="178" class="step">recommend_precision_nutrition ·  myo-inositol · Č supplements</text>
      <text x="20" y="202" class="num">7</text><text x="36" y="202" class="step">match_clinical_trials · demo eligibility trace</text>
      <text x="20" y="226" class="num">8</text><text x="36" y="226" class="step">generate_clinician_handoff · questions for GP</text>
      <text x="20" y="250" class="num">9</text><text x="36" y="250" class="step">safety_guardrail · not a diagnosis engine</text>
    </g>

    <rect x="400" y="50" width="360" height="230" rx="10" fill="#ffffff" stroke="#e8e4df"/>
    <text x="420" y="78" class="n">Output to patient</text>
    <text x="420" y="104" class="step">Intent badge + risk level</text>
    <text x="420" y="128" class="step">4-layer scores</text>
    <text x="420" y="152" class="step">Ranked care gaps</text>
    <text x="420" y="176" class="step">/Č supplement plan</text>
    <text x="420" y="200" class="step">Trial criteria · demo</text>
    <text x="420" y="224" class="step">Doctor handoff questions</text>
    <text x="420" y="248" class="step">Full agent trace · Show why</text>
  </g>

  <rect x="60" y="490" width="780" height="0" fill="none"/>
  <text x="450" y="500" text-anchor="middle" class="s">Every tool step stored in patient-memory.json · auditable for judges</text>
</svg>
