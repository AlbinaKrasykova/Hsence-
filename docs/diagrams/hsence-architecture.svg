  <rect x="60" y="588" width="800" height="200" rx="12" fill="#eeeefb" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="80" y="613" class="box-title">Medical Intelligence · Track 01 CDSS · built</text>
  <text x="80" y="638" class="chip">planner.py ’ orchestrator.py ’ 9 rule-based tools</text>

  <rect x="80" y="652" width="130" height="28" rx="6" fill="#ffffff" stroke="#e8e4df"/>
  <text x="88" y="670" class="small">parse_lab_panel</text>
  <rect x="220" y="652" width="130" height="28" rx="6" fill="#ffffff" stroke="#e8e4df"/>
  <text x="228" y="670" class="small">score_care_gaps</text>
  <rect x="360" y="652" width="140" height="28" rx="6" fill="#ffffff" stroke="#e8e4df"/>
  <text x="368" y="670" class="small">score_layer_health</text>
  <rect x="510" y="652" width="150" height="28" rx="6" fill="#ffffff" stroke="#e8e4df"/>
  <text x="518" y="670" class="small">guideline_snippet</text>
  <rect x="670" y="652" width="170" height="28" rx="6" fill="#ffffff" stroke="#e8e4df"/>
  <text x="678" y="670" class="small">precision_nutrition</text>

  <rect x="80" y="688" width="150" height="28" rx="6" fill="#ffffff" stroke="#e8e4df"/>
  <text x="88" y="706" class="small">match_trials · demo</text>
  <rect x="240" y="688" width="170" height="28" rx="6" fill="#ffffff" stroke="#e8e4df"/>
  <text x="248" y="706" class="small">clinician_handoff</text>
  <rect x="420" y="688" width="140" height="28" rx="6" fill="#ffffff" stroke="#e8e4df"/>
  <text x="428" y="706" class="small">safety_guardrail</text>

  <!-- 4 layers -->
  <rect x="80" y="728" width="160" height="44" rx="8" fill="#ffffff" stroke="#7F77DD"/>
  <text x="120" y="755" text-anchor="middle" class="chip">Hormones</text>
  <rect x="250" y="728" width="160" height="44" rx="8" fill="#ffffff" stroke="#7F77DD"/>
  <text x="330" y="755" text-anchor="middle" class="chip">Metabolic</text>
  <rect x="420" y="728" width="160" height="44" rx="8" fill="#ffffff" stroke="#7F77DD"/>
  <text x="500" y="755" text-anchor="middle" class="chip">Cognition</text>
  <rect x="590" y="728" width="160" height="44" rx="8" fill="#ffffff" stroke="#7F77DD"/>
  <text x="670" y="755" text-anchor="middle" class="chip">Inflammation</text>

  <line x1="460" y1="788" x2="460" y2="816" stroke="#6b6660" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Product surface -->
  <rect x="60" y="818" width="800" height="100" rx="12" fill="#f5f5f4" stroke="#b0aca8" stroke-width="1.5"/>
  <text x="80" y="843" class="box-title">Product surface · built</text>
  <rect x="80" y="856" width="170" height="44" rx="8" fill="#ffffff" stroke="#e8e4df"/>
  <text x="165" y="883" text-anchor="middle" class="chip">Setup · 5 steps</text>
  <rect x="265" y="856" width="170" height="44" rx="8" fill="#ffffff" stroke="#e8e4df"/>
  <text x="350" y="883" text-anchor="middle" class="chip">Precision agent</text>
  <rect x="450" y="856" width="170" height="44" rx="8" fill="#ffffff" stroke="#e8e4df"/>
  <text x="535" y="883" text-anchor="middle" class="chip">Daily ritual</text>
  <rect x="635" y="856" width="170" height="44" rx="8" fill="#ffffff" stroke="#e8e4df"/>
  <text x="720" y="883" text-anchor="middle" class="chip">Morning brew</text>

  <!-- Conditions footer -->
  <rect x="60" y="940" width="800" height="88" rx="12" fill="#ffffff" stroke="#e8e4df" stroke-width="1.5"/>
  <text x="80" y="965" class="box-title">Condition modules</text>
  <text x="80" y="990" class="chip">PCOS · Perimenopause · GDM · Osteoporosis · ER+ survivorship</text>
  <text x="80" y="1012" class="small">Demo persona: Maya Chen · PCOS · berberine front-door query</text>

  <!-- footer -->
  <text x="460" y="1060" text-anchor="middle" class="small">Hsence · Not a diagnosis engine · Decision support + clinician handoff</text>
  <text x="460" y="1082" text-anchor="middle" class="small">github.com/AlbinaKrasykova/Hsence-</text>
</svg>
